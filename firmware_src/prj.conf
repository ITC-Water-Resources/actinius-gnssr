CONFIG_GNSSR_VERSION="V2.0"
CONFIG_GNSSR_CONTACT="ITC <r.rietbroek@utwente.nl>"

CONFIG_LOG=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
#CONFIG_AT_CMD=y
#CONFIG_AT_NOTIF=y
CONFIG_BASE64=y

CONFIG_LTE_LINK_CONTROL=y
#system start up mode of the modem 
CONFIG_LTE_LC_FUNCTIONAL_MODE_MODULE=y
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
#alternative (use NBIOT instead of LTE)
#CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=y


CONFIG_MODEM=y
CONFIG_MODEM_INFO=y
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_KEY_MGMT=y
#CONFIG_NRF_MODEM_LIB_LOG_LEVEL_DBG=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_POSIX_API=y
#CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
# Disable native network stack to save some memory
CONFIG_NET_NATIVE=n



#CONFIG_NRF_SECURITY=y
#CONFIG_OBERON_BACKEND=y
#CONFIG_MBEDTLS_TLS_LIBRARY=y
#CONFIG_MBEDTLS_SSL_SESSION_TICKETS=y

CONFIG_NET_LOG=n

#CONFIG_NET_HTTP_LOG_LEVEL_DBG=y

#for debugging only
CONFIG_LOG_MODE_IMMEDIATE=n


# Main thread
CONFIG_HEAP_MEM_POOL_SIZE=16384 
#CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096

#SD CARD on the featherwing SETTINGS
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVERS=y
CONFIG_FILE_SYSTEM=y
CONFIG_SDHC=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=64
CONFIG_FS_FATFS_LFN=y

CONFIG_FS_LOG_LEVEL_DBG=n
CONFIG_DISK_LOG_LEVEL_DBG=n

#LZ4 STREAM COMPRESSION SETTINGS
CONFIG_LZ4STREAM=y

#use JSON library
CONFIG_CJSON_LIB=y

# Application (can also be selected through menuconfig)

CONFIG_BOOTLOADER_MCUBOOT=y
# SUPL client support
CONFIG_SUPL_CLIENT_LIB=n


#Enable/Disable data upload through LTE-M (cat-M1)
CONFIG_UPLOAD_CLIENT=y

#ADC for Battery voltage tracking
CONFIG_ADC=y
